# ============================================================
# Overrides de PRODUCCIÓN. Se combinan con el base:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Diferencias clave vs. desarrollo:
#   - Imágenes con target `runtime` (sin hot-reload, sin código montado).
#   - El frontend (nginx propio de Ágora) es el único expuesto y proxya /api → backend.
#     Puerto del host configurable con FRONTEND_PORT (por defecto 80); usa otro
#     (p. ej. 8090) si otra app ya ocupa el :80 del servidor.
#   - Postgres y backend NO publican puertos al host (solo red interna).
#   - ENV=production y SEED_ON_START=false (no se siembran datos de ejemplo).
#   - Requiere Docker Compose >= 2.24 (por `!reset`).
# ============================================================
name: agora

services:
  db:
    container_name: agora_postgres   # nombre fijo para pg_dump en el deploy
    restart: always
    ports: !reset []                 # no exponer Postgres fuera del host
    # Datos en una RUTA DEL HOST (persistente, fuera del volumen interno de Docker;
    # sobrevive a redeploys y puedes montar ahí almacenamiento externo/NAS).
    # Define DATA_PATH en el .env del servidor o usa el valor por defecto.
    volumes: !override
      - ${DATA_PATH:-/srv/agora/data}:/var/lib/postgresql/data

  backend:
    build:
      target: runtime
    image: agora-backend:latest
    restart: always
    # El entrypoint aplica migraciones; en prod NO siembra (ENV=production).
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    # Sin bind-mount del código (usa el de la imagen). Solo se monta la carpeta de
    # repos Git de proyectos de desarrollo, en una RUTA DEL HOST (hermana de DATA_PATH;
    # no puede ir dentro porque esa carpeta es el directorio interno de Postgres).
    volumes: !override
      - ${REPOS_PATH:-/srv/agora/repos}:/data/repos
    environment:
      ENV: production
      SEED_ON_START: "false"
    ports: !reset []                 # el backend se sirve vía nginx (/api)

  frontend:
    build:
      target: runtime
    image: agora-frontend:latest
    restart: always
    volumes: !reset []
    environment: !reset {}           # nginx no usa el proxy de Vite
    ports: !override                 # reemplaza (no fusiona) el 5173 de dev
      - "${FRONTEND_PORT:-80}:80"    # FRONTEND_PORT=8090 si el :80 ya está ocupado
    depends_on:
      - backend
